<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Amakha Paris 360 - Catálogo de Fragancias</title>
    <style>
        :root {
            --primary-text: #ffffff;
            --secondary-text: #a1a1a6;
            --accent-gold: #fee082;
            --accent-gold-dark: #d4af37;
            --bg-gradient: linear-gradient(135deg, #09090b 0%, #18181b 100%);
            --card-bg: rgba(30, 30, 34, 0.65);
            --card-border: rgba(255, 255, 255, 0.08);
            --modal-bg: rgba(15, 15, 18, 0.96);
            --glass-panel: rgba(255, 255, 255, 0.03);
            --safe-area-top: env(safe-area-inset-top);
            --safe-area-bottom: env(safe-area-inset-bottom);
        }

        /* Reseteo global premium */
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", Roboto, sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            -webkit-text-size-adjust: 100%;
        }
        
        body { 
            background: var(--bg-gradient); 
            background-attachment: fixed; 
            color: var(--primary-text); 
            min-height: 100vh; 
            padding-bottom: calc(90px + var(--safe-area-bottom)); 
            overflow-x: hidden;
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
        }
        
        button {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            border: none;
            outline: none;
        }

        .bg-shape { position: fixed; border-radius: 50%; filter: blur(120px); z-index: -1; opacity: 0.5; pointer-events: none; }
        .shape1 { width: 400px; height: 400px; background: rgba(214, 175, 55, 0.07); top: -100px; left: -100px; }
        .shape2 { width: 350px; height: 350px; background: rgba(138, 43, 226, 0.04); bottom: 10%; right: -100px; }
        .shape3 { width: 300px; height: 300px; background: rgba(0, 180, 216, 0.03); top: 35%; left: 50%; transform: translateX(-50%); }

        /* Encabezado elegante con vidrio esmerilado */
        header { 
            position: sticky; 
            top: 0; 
            z-index: 100; 
            background: rgba(9, 9, 11, 0.8); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); 
            border-bottom: 1px solid rgba(255, 255, 255, 0.06); 
            padding: calc(16px + var(--safe-area-top)) 20px 16px 20px; 
            text-align: center; 
        }
        header h1 { 
            font-size: 24px; 
            font-weight: 800; 
            letter-spacing: -0.5px; 
            background: linear-gradient(135deg, #fee082 0%, #d4af37 50%, #a37c1e 100%); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        header p { font-size: 13px; color: var(--secondary-text); margin-top: 4px; letter-spacing: 0.3px; }

        .control-panel {
            max-width: 800px;
            margin: 16px auto 0 auto;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .search-container {
            position: relative;
            width: 100%;
        }

        .search-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 14px 16px 14px 44px;
            color: #ffffff;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            border-color: var(--accent-gold-dark);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.1);
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--secondary-text);
            pointer-events: none;
            font-size: 16px;
        }

        /* Categorías Premium deslizadas horizontalmente */
        .category-tabs {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            scrollbar-width: none;
            padding-bottom: 4px;
            -webkit-overflow-scrolling: touch;
        }
        .category-tabs::-webkit-scrollbar { display: none; }

        .category-tab {
            padding: 8px 18px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            color: var(--secondary-text);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s ease;
        }

        .category-tab.active {
            background: var(--accent-gold-dark);
            color: #000000;
            border-color: var(--accent-gold);
            box-shadow: 0 4px 12px rgba(214, 175, 55, 0.2);
        }

        .catalog-container { 
            padding: 16px 20px; 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 16px; 
            max-width: 800px; 
            margin: 0 auto; 
        }
        
        .product-card { 
            background: var(--card-bg); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px); 
            border: 1px solid var(--card-border); 
            border-radius: 20px; 
            padding: 12px; 
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.35); 
            display: flex; 
            flex-direction: column; 
            transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.2s ease, box-shadow 0.2s ease; 
            cursor: pointer; 
        }
        .product-card:hover { 
            transform: translateY(-4px); 
            border-color: rgba(214, 175, 55, 0.25); 
            box-shadow: 0 14px 30px rgba(0, 0, 0, 0.5); 
        }
        
        .product-image-container { 
            width: 100%; 
            aspect-ratio: 1 / 1; 
            background: var(--glass-panel); 
            border-radius: 14px; 
            margin-bottom: 10px; 
            overflow: hidden; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            position: relative;
        }
        .product-image-container img { width: 100%; height: 100%; object-fit: cover; }

        /* Reemplazo de fotos con botellas abstractas luxury */
        .placeholder-bottle-art {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .placeholder-bottle-art svg {
            width: 55%;
            height: 55%;
            filter: drop-shadow(0 8px 12px rgba(0,0,0,0.3));
            z-index: 2;
        }
        .placeholder-bottle-label {
            position: absolute;
            bottom: 12px;
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: rgba(0, 0, 0, 0.5);
            padding: 3px 8px;
            border-radius: 10px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.1);
            color: #ffffff;
            z-index: 3;
            max-width: 85%;
            text-overflow: ellipsis;
            white-space: nowrap;
            overflow: hidden;
        }

        .product-name { font-size: 14px; font-weight: 700; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #ffffff; }
        .product-reference { font-size: 11px; color: var(--secondary-text); margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .product-price { font-size: 16px; font-weight: 800; margin-bottom: 10px; color: #ffffff; }

        .stock-badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 700; text-align: center; margin-bottom: 10px; width: max-content; }
        .stock-high { background: rgba(48, 209, 88, 0.12); color: #30d158; border: 1px solid rgba(48, 209, 88, 0.15); }
        .stock-low { background: rgba(255, 159, 10, 0.12); color: #ff9f0a; border: 1px solid rgba(255, 159, 10, 0.15); }
        .stock-out { background: rgba(255, 69, 58, 0.12); color: #ff453a; border: 1px solid rgba(255, 69, 58, 0.15); opacity: 0.7; }
        .out-of-stock-card { opacity: 0.55; filter: grayscale(0.5); }

        .btn-add-cart { background: var(--accent-gold-dark); color: #000000; border: none; padding: 10px; border-radius: 12px; font-weight: 700; font-size: 12px; cursor: pointer; margin-top: auto; transition: background 0.2s, transform 0.1s; text-transform: uppercase; letter-spacing: 0.3px; width: 100%; }
        .btn-add-cart:hover:not(:disabled) { background: var(--accent-gold); }
        .btn-add-cart:disabled { background: #2c2c2e; color: #636366; cursor: not-allowed; transform: none; }

        /* Botón Flotante con soporte de Safe Area */
        .cart-floating-btn { position: fixed; bottom: calc(16px + var(--safe-area-bottom)); right: 20px; background: #ffffff; color: #1c1c1e; padding: 14px 22px; border-radius: 30px; font-weight: 800; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 101; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: transform 0.2s ease; border: 1px solid rgba(255,255,255,0.1); }
        .cart-floating-btn:hover { transform: scale(1.05); }
        .cart-badge { background: #1c1c1e; color: #ffffff; font-size: 11px; padding: 3px 9px; border-radius: 12px; font-weight: 800; }

        /* Sistema de Notificaciones de lujo (Reemplazo de alert) */
        .toast-container {
            position: fixed;
            top: calc(20px + var(--safe-area-top));
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            z-index: 999;
            background: rgba(20, 20, 25, 0.9);
            border: 1px solid var(--accent-gold-dark);
            box-shadow: 0 12px 30px rgba(0,0,0,0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 14px 24px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s ease;
            opacity: 0;
            pointer-events: none;
            max-width: 90vw;
            width: max-content;
        }
        .toast-container.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        .toast-icon { color: var(--accent-gold); font-size: 18px; font-weight: 800; }
        .toast-text { color: #ffffff; font-size: 14px; font-weight: 600; }

        /* Drawer Lateral del Carrito */
        .cart-modal { position: fixed; top: 0; right: -100%; width: 100%; max-width: 420px; height: 100vh; background: var(--modal-bg); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); box-shadow: -15px 0 45px rgba(0,0,0,0.6); z-index: 200; transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; border-left: 1px solid rgba(255, 255, 255, 0.08); }
        .cart-modal.open { right: 0; }
        
        .cart-header { padding: calc(20px + var(--safe-area-top)) 24px 20px 24px; border-bottom: 1px solid rgba(255,255,255,0.06); display: flex; justify-content: space-between; align-items: center; }
        .cart-header h2 { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
        .close-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); font-size: 16px; cursor: pointer; color: var(--secondary-text); width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .close-btn:hover { background: rgba(255,255,255,0.1); color: #ffffff; }

        .cart-items-container { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .cart-item-info { flex: 1; margin-right: 12px; }
        .cart-item-info h4 { font-size: 14px; font-weight: 700; color: #ffffff; margin-bottom: 2px; }
        .cart-item-info p { font-size: 12px; color: var(--secondary-text); }
        
        .cart-item-actions { display: flex; align-items: center; gap: 10px; }
        .cart-item-actions button { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); width: 28px; height: 28px; border-radius: 50%; font-weight: 700; color: #ffffff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .cart-item-actions button:hover { background: rgba(255,255,255,0.12); }
        .cart-item-actions span { font-size: 14px; font-weight: 700; width: 16px; text-align: center; }

        /* Seccion de entrega del carrito */
        .delivery-section { padding: 16px 0; border-bottom: 1px solid rgba(255,255,255,0.06); margin-bottom: 16px; }
        .delivery-title { font-size: 13px; font-weight: 700; color: var(--secondary-text); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.8px; }
        .delivery-options { display: flex; flex-direction: column; gap: 8px; }
        .delivery-label { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.06); padding: 12px; border-radius: 14px; display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 13px; transition: all 0.2s; }
        .delivery-label input { accent-color: var(--accent-gold-dark); width: 16px; height: 16px; }
        .delivery-label:hover { background: rgba(255, 255, 255, 0.04); }
        .delivery-label.selected { border-color: var(--accent-gold-dark); background: rgba(214, 175, 55, 0.04); }

        .cart-footer { padding: 20px 24px calc(24px + var(--safe-area-bottom)) 24px; border-top: 1px solid rgba(255,255,255,0.06); background: rgba(9,9,11,0.5); }
        .cart-total-row { display: flex; justify-content: space-between; font-size: 18px; font-weight: 800; margin-bottom: 16px; }
        .btn-checkout { background: #25D366; color: white; border: none; width: 100%; padding: 14px; border-radius: 16px; font-size: 15px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.25); transition: background 0.2s, transform 0.1s; }
        .btn-checkout:hover:not(:disabled) { background: #20ba56; }
        .btn-checkout:disabled { background: #2c2c2e; color: #636366; box-shadow: none; cursor: not-allowed; }

        /* Modal de Detalles del Producto */
        .detail-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.95); width: 92%; max-width: 500px; max-height: 85vh; background: var(--modal-bg); backdrop-filter: blur(35px); -webkit-backdrop-filter: blur(35px); border: 1px solid rgba(255, 255, 255, 0.12); border-radius: 28px; z-index: 250; opacity: 0; pointer-events: none; transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 25px 55px rgba(0,0,0,0.6); }
        .detail-modal.open { opacity: 1; pointer-events: auto; transform: translate(-50%, -50%) scale(1); }
        .detail-header { padding: 16px 20px; display: flex; justify-content: flex-end; position: absolute; width: 100%; top: 0; left: 0; z-index: 10; }
        .detail-body { padding: 24px; overflow-y: auto; -webkit-overflow-scrolling: touch; flex: 1; margin-top: 24px; }
        
        .detail-main-info { display: grid; grid-template-columns: 130px 1fr; gap: 20px; margin-bottom: 24px; }
        .detail-image { width: 130px; height: 130px; background: rgba(255,255,255,0.03); border-radius: 18px; overflow: hidden; border: 1px solid rgba(255,255,255,0.06); }
        .detail-image img { width: 100%; height: 100%; object-fit: cover; }
        .detail-title { font-size: 20px; font-weight: 800; margin-bottom: 3px; color: #ffffff; letter-spacing: -0.5px; }
        .detail-inspired { font-size: 12px; color: var(--secondary-text); margin-bottom: 8px; background: rgba(255,255,255,0.04); padding: 3px 8px; border-radius: 8px; width: max-content; }
        .detail-price { font-size: 22px; font-weight: 800; color: var(--accent-gold); margin-bottom: 8px; }

        /* Ficha Técnica de la Fragancia */
        .olfactive-panel {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.04);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .olfactive-row {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .olfactive-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--accent-gold-dark);
            letter-spacing: 0.8px;
        }
        .olfactive-desc {
            font-size: 13px;
            color: #e5e5ea;
            line-height: 1.4;
        }

        /* Indicador de Intensidad Olfativa */
        .intensity-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.02);
            padding: 12px 16px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.04);
            margin-bottom: 20px;
        }
        .intensity-title { font-size: 12px; font-weight: 700; color: var(--secondary-text); text-transform: uppercase; }
        .intensity-value { font-size: 13px; font-weight: 700; color: #ffffff; }
        .intensity-bars { display: flex; gap: 4px; }
        .intensity-bar { width: 14px; height: 6px; border-radius: 2px; background: rgba(255,255,255,0.1); }
        .intensity-bar.active { background: var(--accent-gold-dark); }

        .detail-description-title { font-size: 12px; font-weight: 700; text-transform: uppercase; color: var(--secondary-text); margin-bottom: 6px; letter-spacing: 0.5px; }
        .detail-description-text { font-size: 13px; line-height: 1.5; color: #e5e5ea; margin-bottom: 24px; background: rgba(255,255,255,0.02); padding: 12px 16px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.04); }

        /* Sugerencias Dinámicas */
        .suggestions-section { border-top: 1px solid rgba(255,255,255,0.06); padding-top: 20px; margin-bottom: 12px; }
        .suggestions-title { font-size: 12px; font-weight: 700; text-transform: uppercase; color: var(--accent-gold); margin-bottom: 12px; letter-spacing: 0.5px; }
        .suggestions-wrapper { display: flex; gap: 12px; overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 8px; scrollbar-width: none; }
        .suggestions-wrapper::-webkit-scrollbar { display: none; }
        
        .suggestion-card { flex: 0 0 110px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); padding: 8px; border-radius: 14px; cursor: pointer; text-align: center; transition: border-color 0.2s; }
        .suggestion-card:hover { border-color: rgba(214, 175, 55, 0.3); }
        .suggestion-card .sug-image-container { width: 100%; aspect-ratio: 1/1; border-radius: 10px; margin-bottom: 6px; overflow: hidden; background: rgba(0,0,0,0.2); }
        .suggestion-card h5 { font-size: 11px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #ffffff; }
        .suggestion-card p { font-size: 11px; color: var(--secondary-text); font-weight: 700; margin-top: 2px; }

        /* Panel de Seeding Automático */
        .seeding-container {
            max-width: 600px;
            margin: 40px auto;
            padding: 24px;
            background: rgba(214, 175, 55, 0.04);
            border: 1px solid rgba(214, 175, 55, 0.15);
            border-radius: 24px;
            text-align: center;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .seeding-container h3 { font-size: 18px; font-weight: 800; color: var(--accent-gold); margin-bottom: 10px; }
        .seeding-container p { font-size: 13px; color: var(--secondary-text); margin-bottom: 18px; line-height: 1.4; }
        .btn-seed { background: var(--accent-gold-dark); color: #000000; font-weight: 800; font-size: 13px; padding: 12px 24px; border-radius: 12px; cursor: pointer; text-transform: uppercase; transition: transform 0.2s; }
        .btn-seed:active { transform: scale(0.98); }

        /* Capas de fondo oscuras con blur unificado */
        .global-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.7); z-index: 150; display: none; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
        .global-overlay.open { display: block; }
        .global-overlay.detail-z { z-index: 240; }
    </style>
</head>
<body>

    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>
    <div class="bg-shape shape3"></div>

    <header>
        <h1>Amakha Paris 360</h1>
        <p>Catálogo Digital de Fragancias Premium</p>
    </header>

    <!-- Barra de Búsqueda y Filtros Premium -->
    <div class="control-panel">
        <div class="search-container">
            <span class="search-icon">🔍</span>
            <input type="text" id="search-bar" class="search-input" placeholder="Buscar por nombre o referencia olfativa...">
        </div>
        <div class="category-tabs" id="category-tabs">
            <button class="category-tab active" data-filter="all">Todos</button>
            <button class="category-tab" data-filter="Femenino">Femeninos</button>
            <button class="category-tab" data-filter="Masculino">Masculinos</button>
            <button class="category-tab" data-filter="Unissex">Unisex</button>
            <button class="category-tab" data-filter="Infantil">Infantiles</button>
        </div>
    </div>

    <!-- Contenedor Principal del Catálogo -->
    <main class="catalog-container" id="catalog">
        <p style="text-align:center; width:100%; color: var(--secondary-text); padding: 40px 0;">Cargando catálogo inteligente...</p>
    </main>

    <!-- Botón Flotante del Carrito -->
    <div class="cart-floating-btn" id="cart-btn">
        <span>Pedido</span>
        <span class="cart-badge" id="cart-badge-count">0</span>
    </div>

    <!-- Capa desenfocada global -->
    <div class="global-overlay" id="global-overlay"></div>

    <!-- Notificación Toast Luxury -->
    <div class="toast-container" id="custom-toast">
        <span class="toast-icon">✓</span>
        <span class="toast-text" id="toast-text">Producto agregado al pedido</span>
    </div>

    <!-- Modal Central de Detalles -->
    <div class="detail-modal" id="detail-modal">
        <div class="detail-header">
            <button class="close-btn" id="detail-close">✕</button>
        </div>
        <div class="detail-body" id="detail-body-content">
            <!-- Contenido dinámico de detalles -->
        </div>
    </div>

    <!-- Drawer Lateral del Carrito -->
    <div class="cart-modal" id="cart-modal">

        // Notificación de lujo tipo Toast
        function showToast(text) {
            toastText.innerText = text;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }

            globalOverlay.classList.remove('detail-z');
        };
        
        const closeAllModales = () => {

        // Generador dinámico de degradados de botellas de lujo para emular el producto en 3D
        function getPremiumBottleArt(id, perfume) {
            let gradientStart = "#1e1e24";
            let gradientEnd = "#09090b";
            let bottleColor = "rgba(255, 255, 255, 0.4)";

            if (perfume.genero === "Femenino") {
                if (perfume.familia.includes("Adocicado")) {
                    gradientStart = "#9d4edd";
                    gradientEnd = "#3c096c";
                    bottleColor = "rgba(214, 175, 55, 0.6)";
                } else if (perfume.familia.includes("Floral")) {
                    gradientStart = "#ff85a1";
                    gradientEnd = "#590d22";
                    bottleColor = "rgba(255, 255, 255, 0.5)";
                } else {
                    gradientStart = "#ffb3c1";
                    gradientEnd = "#800f2f";
                }
            } else if (perfume.genero === "Masculino") {
                if (perfume.familia.includes("Amadeirado")) {
                    gradientStart = "#9a7b56";
                    gradientEnd = "#1c1917";
                    bottleColor = "rgba(214, 175, 55, 0.65)";
                } else if (perfume.familia.includes("Refrescante")) {
                    gradientStart = "#0077b6";
                    gradientEnd = "#03045e";
                    bottleColor = "rgba(255, 255, 255, 0.45)";
                } else {
                    gradientStart = "#3f3f46";
                    gradientEnd = "#09090b";
                }
            } else {
                gradientStart = "#06d6a0";
                gradientEnd = "#073b3a";
            }

            return `
                <div class="placeholder-bottle-art" style="background: linear-gradient(135deg, ${gradientStart} 0%, ${gradientEnd} 100%)">
                    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M42 22C42 20.5 43.5 19 45 19H55C56.5 19 58 20.5 58 22V28H42V22Z" fill="${bottleColor}" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
                        <path d="M45 28H55V32H45V28Z" fill="rgba(255,255,255,0.8)"/>
                        <rect x="30" y="32" width="40" height="48" rx="8" fill="${bottleColor}" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                        <circle cx="50" cy="56" r="10" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.2)"/>
                    </svg>
                    <span class="placeholder-bottle-label">${perfume.nombre}</span>
                </div>
            `;
        }

        // Filtrar y renderizar catálogo maestro
        function renderCatalog() {
            const catalogContainer = document.getElementById('catalog');
            catalogContainer.innerHTML = '';

            const keys = Object.keys(MASTER_CATALOG);
            let hasElements = false;

            keys.forEach((id) => {
                const perfume = MASTER_CATALOG[id];
                const realStock = dbInventory[id] !== undefined ? dbInventory[id].stock : 5; // Default stock fallback

                // Filtros
                if (currentFilter !== "all" && perfume.genero !== currentFilter) return;
                
                const searchLower = searchQuery.toLowerCase();
                if (searchQuery && 
                    !perfume.nombre.toLowerCase().includes(searchLower) && 
                    !perfume.inspiredBy.toLowerCase().includes(searchLower) &&
                    !perfume.familia.toLowerCase().includes(searchLower)) {
                    return;
                }

                hasElements = true;

                let stockClass = '', stockText = '', cardClass = 'product-card', isBtnDisabled = false;
                if (realStock > 4) {
                    stockClass = 'stock-high';
                    stockText = `En Stock: ${realStock} disp.`;
                } else if (realStock > 0 && realStock <= 4) {
                    stockClass = 'stock-low';
                    stockText = `Últimas ${realStock} disp.`;
                } else {
                    stockClass = 'stock-out';
                    stockText = 'Agotado temporal';
                    cardClass += ' out-of-stock-card';
                    isBtnDisabled = true;
                }

                const card = document.createElement('div');
                card.className = cardClass;
                card.innerHTML = `
                    <div class="product-image-container" onclick="window.amp_openDetail('${id}')">
                        ${getPremiumBottleArt(id, perfume)}
                    </div>
                    <div onclick="window.amp_openDetail('${id}')">
                        <h2 class="product-name">${perfume.nombre}</h2>
                        <div class="product-reference">Inspirado: ${perfume.inspiredBy}</div>
                        <div class="product-price">$${perfume.precio}</div>
                        <div class="stock-badge ${stockClass}">${stockText}</div>
                    </div>
                    <button class="btn-add-cart" ${isBtnDisabled ? 'disabled' : ''} data-id="${id}">
                        ${isBtnDisabled ? 'Agotado' : 'Agregar'}
                    </button>
                `;
                catalogContainer.appendChild(card);
            });

            if (!hasElements) {
                catalogContainer.innerHTML = '<p style="text-align:center; width:100%; color: var(--secondary-text); padding: 40px 0;">No se encontraron perfumes para tu búsqueda.</p>';
            }

            document.querySelectorAll('#catalog .btn-add-cart').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    addToCart(btn.getAttribute('data-id'));
                });
            });
        }

        // Detalle de Perfume Individual
        window.amp_currentDetailId = null;
        window.amp_openDetail = function(id, isRefresh = false) {
            window.amp_currentDetailId = id;
            const perfume = MASTER_CATALOG[id];
            if (!perfume) return;

            const realStock = dbInventory[id] !== undefined ? dbInventory[id].stock : 5;
            const descripcionText = perfume.descripcion;
            
            let stockClass = '', stockText = '', isBtnDisabled = realStock <= 0;
            if (realStock > 4) { stockClass = 'stock-high'; stockText = `Stock: ${realStock} disp.`; }
            else if (realStock > 0) { stockClass = 'stock-low'; stockText = `Solo ${realStock} disp.`; }
            else { stockClass = 'stock-out'; stockText = 'Agotado'; }

            // Generar barras gráficas de intensidad olfativa
            let intensityLevel = 3; 
            if (perfume.intensidad === "Suave") intensityLevel = 1;
            else if (perfume.intensidad === "Intenso") intensityLevel = 5;

            let barsHtml = '';
            for(let i=1; i<=5; i++) {
                barsHtml += `<div class="intensity-bar ${i <= intensityLevel ? 'active' : ''}"></div>`;
            }

            // Sugerencias Dinámicas Inteligentes del mismo Género
            const sugerenciasIds = Object.keys(MASTER_CATALOG).filter(item => item !== id && MASTER_CATALOG[item].genero === perfume.genero);
            let sugerenciasHtml = '';
            
            sugerenciasIds.slice(0, 5).forEach(sugId => {
                const sugPerfume = MASTER_CATALOG[sugId];
                sugerenciasHtml += `
                    <div class="suggestion-card" onclick="window.amp_openDetail('${sugId}')">
                        <div class="sug-image-container">
                            ${getPremiumBottleArt(sugId, sugPerfume)}
                        </div>
                        <h5>${sugPerfume.nombre}</h5>
                        <p>$${sugPerfume.precio}</p>
                    </div>
                `;
            });

            detailBodyContent.innerHTML = `
                <div class="detail-main-info">
                    <div class="detail-image">
                        ${getPremiumBottleArt(id, perfume)}
                    </div>
                    <div>
                        <h3 class="detail-title">${perfume.nombre}</h3>
                        <div class="detail-inspired">Referencia: ${perfume.inspiredBy} (${perfume.reference})</div>
                        <div class="detail-price">$${perfume.precio}</div>
                        <div class="stock-badge ${stockClass}">${stockText}</div>
                    </div>
                </div>

                <div class="intensity-row">
                    <div class="intensity-title">Intensidad de Aroma</div>
                    <div style="display:flex; align-items:center; gap:10px;">
                        <span class="intensity-value">${perfume.intensidad}</span>
                        <div class="intensity-bars">${barsHtml}</div>
                    </div>
                </div>

                <div class="olfactive-panel">
                    <div class="olfactive-row">
                        <span class="olfactive-title">Familia Olfativa</span>
                        <span class="olfactive-desc">${perfume.familia}</span>
                    </div>
                    <div class="olfactive-row">
                        <span class="olfactive-title">Notas de Salida (Topo)</span>
                        <span class="olfactive-desc">${perfume.topNotes}</span>
                    </div>
                    <div class="olfactive-row">
                        <span class="olfactive-title">Notas de Corazón</span>
                        <span class="olfactive-desc">${perfume.heartNotes}</span>
                    </div>
                    <div class="olfactive-row">
                        <span class="olfactive-title">Notas de Fondo (Base)</span>
                        <span class="olfactive-desc">${perfume.baseNotes}</span>
                    </div>
                </div>

                <div class="detail-description-title">Descripción de la Experiencia</div>
                <div class="detail-description-text">${descripcionText}</div>
                
                <div class="suggestions-section">
                    <div class="suggestions-title">Otras fragancias para ti</div>
                    <div class="suggestions-wrapper">
                        ${sugerenciasHtml}
                    </div>
                </div>
                
                <button class="btn-add-cart" id="modal-add-btn" ${isBtnDisabled ? 'disabled' : ''} style="margin-top:20px;">
                    ${isBtnDisabled ? 'Agotado' : 'Agregar al pedido'}
                </button>
            `;

            document.getElementById('modal-add-btn').addEventListener('click', () => addToCart(id));

            if (!isRefresh) {
                detailModal.classList.add('open');
                globalOverlay.classList.add('open');
                globalOverlay.classList.add('detail-z');
            }
        };

        function addToCart(id) {
            const maxAvailable = dbInventory[id] !== undefined ? dbInventory[id].stock : 5;
            const currentInCart = cart[id]?.quantity || 0;

            if (currentInCart < maxAvailable) {
                if (!cart[id]) {
                    cart[id] = {
                        nombre: MASTER_CATALOG[id].nombre,
                        precio: MASTER_CATALOG[id].precio,
                        quantity: 1
                    };
                } else {
                    cart[id].quantity += 1;
                }
                showToast(`Agregado: ${MASTER_CATALOG[id].nombre}`);
                renderCart();
            } else {
                showToast("Cantidad máxima en stock alcanzada.");
            }
        }

        window.amp_changeQuantity = function(id, change) {
            if (!cart[id]) return;
            const maxAvailable = dbInventory[id] !== undefined ? dbInventory[id].stock : 5;
            const newQuantity = cart[id].quantity + change;

            if (newQuantity <= 0) {
                delete cart[id];
            } else if (newQuantity <= maxAvailable) {
                cart[id].quantity = newQuantity;
            } else {
                showToast("Cantidad máxima en stock alcanzada.");
            }
            renderCart();
        };

        function validateCartStock() {
            let changesMade = false;
            Object.keys(cart).forEach(id => {
                const currentStock = dbInventory[id] !== undefined ? dbInventory[id].stock : 5;
                if (currentStock === 0) {
                    delete cart[id];
                    changesMade = true;
                } else if (cart[id].quantity > currentStock) {
                    cart[id].quantity = currentStock;
                    changesMade = true;
                }
            });
            if (changesMade) renderCart();
        }

        function renderCart() {
            cartItemsContainer.innerHTML = '';
            let total = 0, totalItemsCount = 0;

            Object.keys(cart).forEach(id => {
                const item = cart[id];
                const subtotal = item.precio * item.quantity;
                total += subtotal;
                totalItemsCount += item.quantity;

                const row = document.createElement('div');
                row.className = 'cart-item';
                row.innerHTML = `
                    <div class="cart-item-info">
                        <h4>${item.nombre}</h4>
                        <p>$${item.precio} c/u • Subtotal: $${subtotal}</p>
                    </div>
                    <div class="cart-item-actions">
                        <button onclick="window.amp_changeQuantity('${id}', -1)">-</button>
                        <span>${item.quantity}</span>
                        <button onclick="window.amp_changeQuantity('${id}', 1)">+</button>
                    </div>
                `;
                cartItemsContainer.appendChild(row);
            });

            if (totalItemsCount === 0) {
                cartItemsContainer.innerHTML = '<p style="text-align:center; color:#86868b; margin-top:20px;">Tu pedido está vacío.</p>';
                btnPay.disabled = true;
            } else {
                btnPay.disabled = false;
            }

            cartTotalVal.innerText = `$${total}`;
            cartBadgeCount.innerText = totalItemsCount;
        }

        // Inicializar Firebase si se detecta vacío
        function setupSeederBanner() {
            const catalogContainer = document.getElementById('catalog');
            catalogContainer.innerHTML = `
                <div class="seeding-container">
                    <h3>Base de datos vacía</h3>
                    <p>Detectamos que tu inventario en Firebase no se ha inicializado. Hemos preparado todos los perfumes detallados en tu catálogo del PDF listo para instalarse de forma automática con stock inicial.</p>
                    <button class="btn-seed" id="btn-seed-now">Inicializar Catálogo del PDF</button>
                </div>
            `;

            document.getElementById('btn-seed-now').addEventListener('click', async () => {
                const btn = document.getElementById('btn-seed-now');
                btn.disabled = true;
                btn.innerText = "Instalando base de datos...";
                
                try {
                    const seedData = {};
                    Object.keys(MASTER_CATALOG).forEach((id) => {
                        seedData[id] = {
                            nombre: MASTER_CATALOG[id].nombre,
                            precio: MASTER_CATALOG[id].precio,
                            stock: 8 // Stock por defecto
                        };
                    });

                    await set(perfumesRef, seedData);
                    showToast("¡Base de datos del PDF instalada con éxito!");
                    window.location.reload();
                } catch(err) {
                    console.error("Error al poblar base de datos:", err);
                    showToast("Fallo al inicializar, revise conexión de Firebase.");
                }
            });
        }

        onValue(perfumesRef, (snapshot) => {
            if (!snapshot.exists()) {
                setupSeederBanner();
                dbInventory = {};
                validateCartStock();
                return;
            }

            dbInventory = snapshot.val();
            renderCatalog();
            validateCartStock();
            
            if (detailModal.classList.contains('open') && window.amp_currentDetailId) {
                window.amp_openDetail(window.amp_currentDetailId, true);
            }
        });

        // Filtro por entrada de texto
        searchBar.addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderCatalog();
        });

        // Filtro por pestañas de categoría
        const tabs = document.querySelectorAll('#category-tabs .category-tab');
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentFilter = tab.getAttribute('data-filter');
                renderCatalog();
            });
        });

        // Cambios estéticos de selección de entrega
        const radioDelivery = document.querySelectorAll('input[name="delivery"]');
        radioDelivery.forEach(input => {
            input.addEventListener('change', (e) => {
                document.querySelectorAll('.delivery-label').forEach(label => {
                    label.classList.remove('selected');
                });
                if (e.target.value === 'envio') {
                    document.getElementById('label-envio').classList.add('selected');
                } else {
                    document.getElementById('label-retiro').classList.add('selected');
                }
            });
        });

        btnPay.addEventListener('click', async () => {
            if (Object.keys(cart).length === 0) return;

            btnPay.disabled = true;
            btnPay.innerText = "Confirmando disponibilidad...";

            try {
                const deliveryOption = document.querySelector('input[name="delivery"]:checked').value;
                const entregaTexto = deliveryOption === 'envio' ? "Envío a domicilio" : "Retirar gratis en el local";

                let mensajeWhatsApp = "¡Hola! Vengo de tu catálogo Amakha París 360 y quiero confirmar este pedido:\n\n";
                let totalPedido = 0;

                for (const id of Object.keys(cart)) {
                    const itemComprado = cart[id];
                    const stockProductRef = ref(db, `perfumes/${id}/stock`);

                    // Transacción para descontar inventario de Firebase
                    await runTransaction(stockProductRef, (currentStock) => {
                        if (currentStock === null) return 0;
                        return Math.max(0, currentStock - itemComprado.quantity);
                    });

                    const subtotal = itemComprado.precio * itemComprado.quantity;
                    totalPedido += subtotal;
                    mensajeWhatsApp += `- ${itemComprado.nombre} \n  Cantidad: ${itemComprado.quantity} u. x $${itemComprado.precio}\n  Subtotal: $${subtotal}\n\n`;
                }

                mensajeWhatsApp += `TOTAL COMPRA: $${totalPedido}\n`;
                mensajeWhatsApp += `Método de entrega: ${entregaTexto}\n\n`;
                mensajeWhatsApp += "Quedo a la espera de coordinar el pago y envío.";

                cart = {};
                renderCart();
                closeAllModales();

                const urlWhatsApp = `https://wa.me/${WHATSAPP_NUMERO}?text=${encodeURIComponent(mensajeWhatsApp)}`;
                window.open(urlWhatsApp, '_blank');

            } catch (error) {
                showToast("Fallo al descontar stock. Por favor reintente.");
                console.error(error);
            } finally {
                btnPay.disabled = false;
                btnPay.innerHTML = "Hacer pedido por WhatsApp";
            }
        });
    </script>
</body>
</html>
