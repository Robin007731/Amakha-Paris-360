<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Fragancias 360</title>
    <style>
        :root {
            --primary-text: #ffffff;
            --secondary-text: #a1a1a6;
            --accent-gold: #d4af37;
            --bg-gradient: linear-gradient(135deg, #0f0f11 0%, #1c1c1e 100%);
            --card-bg: rgba(30, 30, 34, 0.75);
            --card-border: rgba(255, 255, 255, 0.12);
            --modal-bg: rgba(20, 20, 22, 0.95);
        }

        /* Reseteo global optimizado para evitar comportamientos nativos extraños en móviles */
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            -webkit-text-size-adjust: 100%;
        }
        
        body { 
            background: var(--bg-gradient); 
            background-attachment: fixed; 
            color: var(--primary-text); 
            min-height: 100vh; 
            padding-bottom: calc(80px + env(safe-area-inset-bottom)); 
            overflow-x: hidden;
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
        }
        
        /* Ajuste de botones para forzar diseño premium en iOS */
        button {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
        }
        
        .bg-shape { position: fixed; border-radius: 50%; filter: blur(80px); z-index: -1; opacity: 0.6; pointer-events: none; }
        .shape1 { width: 300px; height: 300px; background: rgba(214, 175, 55, 0.08); top: -50px; left: -50px; }
        .shape2 { width: 250px; height: 250px; background: rgba(138, 43, 226, 0.05); bottom: 100px; right: -50px; }

        header { 
            position: sticky; 
            top: 0; 
            z-index: 90; 
            background: rgba(15, 15, 17, 0.85); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); 
            border-bottom: 1px solid rgba(255, 255, 255, 0.08); 
            padding: calc(20px + env(safe-area-inset-top)) 20px 20px 20px; 
            text-align: center; 
        }
        header h1 { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; background: linear-gradient(135deg, #fee082 0%, #d4af37 50%, #a37c1e 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        header p { font-size: 13px; color: var(--secondary-text); margin-top: 5px; letter-spacing: 0.3px; }

        .catalog-container { padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 18px; max-width: 800px; margin: 0 auto; }
        
        /* Casillas de productos con relieve individual */
        .product-card { background: var(--card-bg); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid var(--card-border); border-radius: 22px; padding: 14px; box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4); display: flex; flex-direction: column; transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease; cursor: pointer; }
        .product-card:hover { transform: translateY(-3px); border-color: rgba(214, 175, 55, 0.3); box-shadow: 0 16px 35px rgba(0, 0, 0, 0.6); }
        
        .product-image-container { width: 100%; aspect-ratio: 1 / 1; background: rgba(255, 255, 255, 0.04); border-radius: 14px; margin-bottom: 12px; overflow: hidden; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255, 255, 255, 0.05); }
        .product-image-container img { width: 100%; height: 100%; object-fit: cover; }

        .product-name { font-size: 15px; font-weight: 600; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #ffffff; }
        .product-price { font-size: 18px; font-weight: 700; margin-bottom: 10px; color: #ffffff; }

        .stock-badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; text-align: center; margin-bottom: 12px; width: max-content; }
        .stock-high { background: rgba(48, 209, 88, 0.15); color: #30d158; }
        .stock-low { background: rgba(255, 159, 10, 0.15); color: #ff9f0a; }
        .stock-out { background: rgba(255, 69, 58, 0.15); color: #ff453a; opacity: 0.6; }
        .out-of-stock-card { opacity: 0.4; filter: grayscale(0.6); }

        .btn-add-cart { background: var(--accent-gold); color: #000000; border: none; padding: 11px; border-radius: 12px; font-weight: 700; font-size: 13px; cursor: pointer; margin-top: auto; transition: background 0.2s, transform 0.1s; text-transform: uppercase; letter-spacing: 0.2px; width: 100%; }
        .btn-add-cart:disabled { background: #3a3a3c; color: #8e8e93; cursor: not-allowed; transform: none; }

        /* Botón Flotante con soporte de Safe Area */
        .cart-floating-btn { position: fixed; bottom: calc(24px + env(safe-area-inset-bottom)); right: 24px; background: #ffffff; color: #1c1c1e; padding: 16px 22px; border-radius: 30px; font-weight: 700; box-shadow: 0 12px 35px rgba(0,0,0,0.6); z-index: 100; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: transform 0.2s; }
        .cart-badge { background: #1c1c1e; color: #ffffff; font-size: 12px; padding: 3px 9px; border-radius: 12px; font-weight: 700; }

        /* Drawer Lateral del Carrito */
        .cart-modal { position: fixed; top: 0; right: -100%; width: 100%; max-width: 400px; height: 100vh; background: var(--modal-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); box-shadow: -15px 0 40px rgba(0,0,0,0.5); z-index: 200; transition: right 0.35s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; border-left: 1px solid rgba(255, 255, 255, 0.08); }
        .cart-modal.open { right: 0; }
        
        .cart-header { padding: calc(24px + env(safe-area-inset-top)) 20px 24px 20px; border-bottom: 1px solid rgba(255,255,255,0.08); display: flex; justify-content: space-between; align-items: center; }
        .cart-header h2 { font-size: 20px; font-weight: 700; }
        .close-btn { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--secondary-text); padding: 5px; }

        .cart-items-container { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.06); }
        .cart-item-info h4 { font-size: 15px; font-weight: 600; }
        .cart-item-info p { font-size: 13px; color: var(--secondary-text); }
        
        .cart-item-actions { display: flex; align-items: center; gap: 12px; }
        .cart-item-actions button { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); width: 30px; height: 30px; border-radius: 50%; font-weight: 600; color: #ffffff; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* Opciones de Entrega y Envío */
        .delivery-section { padding: 0 0 15px 0; border-bottom: 1px solid rgba(255,255,255,0.08); margin-bottom: 15px; }
        .delivery-title { font-size: 14px; font-weight: 600; color: var(--secondary-text); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
        .delivery-options { display: flex; flex-direction: column; gap: 10px; }
        .delivery-label { background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.08); padding: 12px; border-radius: 12px; display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 14px; transition: border-color 0.2s; }
        .delivery-label input { accent-color: var(--accent-gold); width: 18px; height: 18px; }
        .delivery-label:has(input:checked) { border-color: var(--accent-gold); background: rgba(214, 175, 55, 0.05); }

        .cart-footer { padding: 24px 20px calc(24px + env(safe-area-inset-bottom)) 20px; border-top: 1px solid rgba(255,255,255,0.08); background: rgba(15,15,17,0.6); }
        .cart-total-row { display: flex; justify-content: space-between; font-size: 19px; font-weight: 700; margin-bottom: 18px; }
        .btn-checkout { background: #25D366; color: white; border: none; width: 100%; padding: 15px; border-radius: 16px; font-size: 16px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.2); }
        .btn-checkout:disabled { background: #3a3a3c; color: #8e8e93; box-shadow: none; cursor: not-allowed; }

        /* Modal de Detalles del Producto */
        .detail-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9); width: 92%; max-width: 500px; max-height: 85vh; background: var(--modal-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 28px; z-index: 250; opacity: 0; pointer-events: none; transition: transform 0.3s ease, opacity 0.3s ease; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.6); }
        .detail-modal.open { opacity: 1; pointer-events: auto; transform: translate(-50%, -50%) scale(1); }
        .detail-header { padding: 16px 20px; display: flex; justify-content: flex-end; position: absolute; width: 100%; top: 0; left: 0; z-index: 10; }
        .detail-body { padding: 24px; overflow-y: auto; -webkit-overflow-scrolling: touch; flex: 1; margin-top: 30px; }
        
        .detail-main-info { display: grid; grid-template-columns: 120px 1fr; gap: 16px; margin-bottom: 20px; }
        .detail-image { width: 120px; height: 120px; background: rgba(255,255,255,0.04); border-radius: 16px; overflow: hidden; border: 1px solid rgba(255,255,255,0.08); }
        .detail-image img { width: 100%; height: 100%; object-fit: cover; }
        .detail-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
        .detail-price { font-size: 22px; font-weight: 800; color: var(--accent-gold); margin-bottom: 6px; }
        
        .detail-description-title { font-size: 13px; font-weight: 700; text-transform: uppercase; color: var(--secondary-text); margin-bottom: 6px; letter-spacing: 0.5px; }
        .detail-description-text { font-size: 14px; line-height: 1.5; color: #e5e5ea; margin-bottom: 24px; background: rgba(255,255,255,0.03); padding: 14px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.05); }

        /* Sugerencias Dinámicas Inteligentes */
        .suggestions-section { border-top: 1px solid rgba(255,255,255,0.08); padding-top: 20px; margin-bottom: 10px; }
        .suggestions-title { font-size: 13px; font-weight: 700; text-transform: uppercase; color: var(--accent-gold); margin-bottom: 12px; letter-spacing: 0.5px; }
        .suggestions-wrapper { display: flex; gap: 12px; overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 8px; scrollbar-width: none; }
        .suggestions-wrapper::-webkit-scrollbar { display: none; }
        
        .suggestion-card { flex: 0 0 110px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); padding: 8px; border-radius: 14px; cursor: pointer; text-align: center; transition: border-color 0.2s; }
        .suggestion-card:hover { border-color: rgba(214, 175, 55, 0.4); }
        .suggestion-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 8px; margin-bottom: 6px; background: rgba(0,0,0,0.2); }
        .suggestion-card h5 { font-size: 11px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #ffffff; }
        .suggestion-card p { font-size: 11px; color: var(--secondary-text); font-weight: 700; margin-top: 2px; }

        /* Capas de fondo oscuras con blur unificado */
        .global-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.6); z-index: 150; display: none; backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px); }
        .global-overlay.open { display: block; }
        .global-overlay.detail-z { z-index: 240; }
    </style>
</head>
<body>

    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>

    <header>
        <h1>Amakha Paris 360</h1>
        <p>Catálogo de Fragancias Disponibles</p>
    </header>

    <main class="catalog-container" id="catalog">
        <p style="text-align:center; width:100%; color: var(--secondary-text);">Cargando catálogo...</p>
    </main>

    <!-- Botón Flotante del Carrito -->
    <div class="cart-floating-btn" id="cart-btn">
        <span>Mi Pedido</span>
        <span class="cart-badge" id="cart-badge-count">0</span>
    </div>

    <!-- Capa desenfocada global -->
    <div class="global-overlay" id="global-overlay"></div>

    <!-- Modal Central de Detalles -->
    <div class="detail-modal" id="detail-modal">
        <div class="detail-header">
            <button class="close-btn" id="detail-close">✕</button>
        </div>
        <div class="detail-body" id="detail-body-content">
            <!-- Contenido dinámico de detalles -->
        </div>
    </div>

    <!-- Drawer Lateral del Carrito -->
    <div class="cart-modal" id="cart-modal">
        <div class="cart-header">
            <h2>Tu Pedido</h2>
            <button class="close-btn" id="cart-close">✕</button>
        </div>
        <div class="cart-items-container">
            <div id="cart-items">
                <!-- Items dinámicos -->
            </div>
        </div>
        <div class="cart-footer">
            <!-- Selección de entrega integrada -->
            <div class="delivery-section">
                <div class="delivery-title">Método de entrega</div>
                <div class="delivery-options">
                    <label class="delivery-label">
                        <input type="radio" name="delivery" value="retiro" checked>
                        <span>Retirar gratis en dirección del vendedor</span>
                    </label>
                    <label class="delivery-label">
                        <input type="radio" name="delivery" value="envio">
                        <span>Pagar envío a domicilio</span>
                    </label>
                </div>
            </div>
            
            <div class="cart-total-row">
                <span>Total:</span>
                <span id="cart-total-val">$0</span>
            </div>
            <button class="btn-checkout" id="btn-pay" disabled>
                Hacer pago por WhatsApp
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue, runTransaction } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDtT22MM01MGoNosSBNHEdvKQlGu8ghIBQ",
            authDomain: "inventario-de-local.firebaseapp.com",
            databaseURL: "https://inventario-de-local-default-rtdb.firebaseio.com",
            projectId: "inventario-de-local",
            storageBucket: "inventario-de-local.firebasestorage.app",
            messagingSenderId: "535105215340",
            appId: "1:535105215340:web:47fcd308f64297b1c23149"
        };

        const WHATSAPP_NUMERO = "59898324329"; 

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const perfumesRef = ref(db, "perfumes");

        let dbInventory = {}; 
        let cart = {};        

        const cartBtn = document.getElementById('cart-btn');
        const cartModal = document.getElementById('cart-modal');
        const detailModal = document.getElementById('detail-modal');
        const globalOverlay = document.getElementById('global-overlay');
        const cartClose = document.getElementById('cart-close');
        const detailClose = document.getElementById('detail-close');
        const cartItemsContainer = document.getElementById('cart-items');
        const cartTotalVal = document.getElementById('cart-total-val');
        const cartBadgeCount = document.getElementById('cart-badge-count');
        const btnPay = document.getElementById('btn-pay');
        const detailBodyContent = document.getElementById('detail-body-content');

        const openCart = () => {
            cartModal.classList.add('open');
            globalOverlay.classList.add('open');
            globalOverlay.classList.remove('detail-z');
        };
        const closeAllModales = () => {
            cartModal.classList.remove('open');
            detailModal.classList.remove('open');
            globalOverlay.classList.remove('open');
            globalOverlay.classList.remove('detail-z');
        };

        cartBtn.addEventListener('click', openCart);
        cartClose.addEventListener('click', closeAllModales);
        detailClose.addEventListener('click', closeAllModales);
        globalOverlay.addEventListener('click', closeAllModales);

        onValue(perfumesRef, (snapshot) => {
            const catalogContainer = document.getElementById('catalog');
            catalogContainer.innerHTML = ''; 

            if (!snapshot.exists()) {
                catalogContainer.innerHTML = '<p style="text-align:center; width:100%; color: var(--secondary-text);">No hay perfumes disponibles actualmente.</p>';
                dbInventory = {};
                validateCartStock();
                return;
            }

            dbInventory = snapshot.val();
            
            Object.keys(dbInventory).forEach((id) => {
                const perfume = dbInventory[id];
                let stockClass = '', stockText = '', cardClass = 'product-card', isBtnDisabled = false;

                if (perfume.stock > 4) {
                    stockClass = 'stock-high';
                    stockText = `Stock: ${perfume.stock} disp.`;
                } else if (perfume.stock > 0 && perfume.stock <= 4) {
                    stockClass = 'stock-low';
                    stockText = `Solo ${perfume.stock} disponibles`;
                } else {
                    stockClass = 'stock-out';
                    stockText = 'Agotado';
                    cardClass += ' out-of-stock-card';
                    isBtnDisabled = true;
                }

                const imagenSrc = perfume.fotoUrl ? perfume.fotoUrl : 'https://via.placeholder.com/300?text=Sin+Foto';

                const card = document.createElement('div');
                card.className = cardClass;
                card.innerHTML = `
                    <div class="product-image-container" onclick="window.amp_openDetail('${id}')">
                        <img src="${imagenSrc}" alt="${perfume.nombre}" loading="lazy" onerror="this.onerror=null; this.src='https://via.placeholder.com/300?text=Error+Enlace';">
                    </div>
                    <div onclick="window.amp_openDetail('${id}')">
                        <h2 class="product-name">${perfume.nombre}</h2>
                        <div class="product-price">$${perfume.precio}</div>
                        <div class="stock-badge ${stockClass}">${stockText}</div>
                    </div>
                    <button class="btn-add-cart" ${isBtnDisabled ? 'disabled' : ''} data-id="${id}">
                        ${isBtnDisabled ? 'Agotado' : 'Agregar'}
                    </button>
                `;
                catalogContainer.appendChild(card);
            });

            document.querySelectorAll('#catalog .btn-add-cart').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    addToCart(btn.getAttribute('data-id'));
                });
            });

            validateCartStock();
            
            if (detailModal.classList.contains('open') && window.amp_currentDetailId) {
                window.amp_openDetail(window.amp_currentDetailId, true);
            }
        });

        window.amp_currentDetailId = null;
        window.amp_openDetail = function(id, isRefresh = false) {
            window.amp_currentDetailId = id;
            const perfume = dbInventory[id];
            if (!perfume) return;

            const imagenSrc = perfume.fotoUrl ? perfume.fotoUrl : 'https://via.placeholder.com/300?text=Sin+Foto';
            const descripcionText = perfume.descripcion ? perfume.descripcion : 'Fragancia de alta calidad perteneciente a la línea premium internacional.';
            
            let stockClass = '', stockText = '', isBtnDisabled = perfume.stock <= 0;
            if (perfume.stock > 4) { stockClass = 'stock-high'; stockText = `Stock: ${perfume.stock} disp.`; }
            else if (perfume.stock > 0) { stockClass = 'stock-low'; stockText = `Solo ${perfume.stock} disponibles`; }
            else { stockClass = 'stock-out'; stockText = 'Agotado'; }

            const sugerenciasIds = Object.keys(dbInventory).filter(item => item !== id && dbInventory[item].stock > 0);
            let sugerenciasHtml = '';
            
            sugerenciasIds.slice(0, 4).forEach(sugId => {
                const sugPerfume = dbInventory[sugId];
                const sugImg = sugPerfume.fotoUrl ? sugPerfume.fotoUrl : 'https://via.placeholder.com/150?text=Sin+Foto';
                sugerenciasHtml += `
                    <div class="suggestion-card" onclick="window.amp_openDetail('${sugId}')">
                        <img src="${sugImg}" alt="${sugPerfume.nombre}">
                        <h5>${sugPerfume.nombre}</h5>
                        <p>$${sugPerfume.precio}</p>
                    </div>
                `;
            });

            detailBodyContent.innerHTML = `
                <div class="detail-main-info">
                    <div class="detail-image">
                        <img src="${imagenSrc}" alt="${perfume.nombre}">
                    </div>
                    <div>
                        <h3 class="detail-title">${perfume.nombre}</h3>
                        <div class="detail-price">$${perfume.precio}</div>
                        <div class="stock-badge ${stockClass}">${stockText}</div>
                    </div>
                </div>
                <div class="detail-description-title">Descripción</div>
                <div class="detail-description-text">${descripcionText}</div>
                
                <div class="suggestions-section">
                    <div class="suggestions-title">Sugerencias para ti</div>
                    <div class="suggestions-wrapper">
                        ${sugerenciasHtml ? sugerenciasHtml : '<p style="font-size:12px; color:var(--secondary-text);">No hay otras sugerencias por el momento.</p>'}
                    </div>
                </div>
                
                <button class="btn-add-cart" id="modal-add-btn" ${isBtnDisabled ? 'disabled' : ''}>
                    ${isBtnDisabled ? 'Agotado' : 'Agregar al pedido'}
                </button>
            `;

            document.getElementById('modal-add-btn').addEventListener('click', () => addToCart(id));

            if (!isRefresh) {
                detailModal.classList.add('open');
                globalOverlay.classList.add('open');
                globalOverlay.classList.add('detail-z');
            }
        };

        function addToCart(id) {
            const maxAvailable = dbInventory[id]?.stock || 0;
            const currentInCart = cart[id]?.quantity || 0;

            if (currentInCart < maxAvailable) {
                if (!cart[id]) {
                    cart[id] = {
                        nombre: dbInventory[id].nombre,
                        precio: dbInventory[id].precio,
                        quantity: 1
                    };
                } else {
                    cart[id].quantity += 1;
                }
                renderCart();
            } else {
                alert("Cantidad máxima en stock alcanzado.");
            }
        }

        window.amp_changeQuantity = function(id, change) {
            if (!cart[id]) return;
            const maxAvailable = dbInventory[id]?.stock || 0;
            const newQuantity = cart[id].quantity + change;

            if (newQuantity <= 0) {
                delete cart[id];
            } else if (newQuantity <= maxAvailable) {
                cart[id].quantity = newQuantity;
            } else {
                alert("Cantidad máxima en stock alcanzado.");
            }
            renderCart();
        };

        function validateCartStock() {
            let changesMade = false;
            Object.keys(cart).forEach(id => {
                const currentStock = dbInventory[id]?.stock || 0;
                if (currentStock === 0) {
                    delete cart[id];
                    changesMade = true;
                } else if (cart[id].quantity > currentStock) {
                    cart[id].quantity = currentStock;
                    changesMade = true;
                }
            });
            if (changesMade) renderCart();
        }

        function renderCart() {
            cartItemsContainer.innerHTML = '';
            let total = 0, totalItemsCount = 0;

            Object.keys(cart).forEach(id => {
                const item = cart[id];
                const subtotal = item.precio * item.quantity;
                total += subtotal;
                totalItemsCount += item.quantity;

                const row = document.createElement('div');
                row.className = 'cart-item';
                row.innerHTML = `
                    <div class="cart-item-info">
                        <h4>${item.nombre}</h4>
                        <p>$${item.precio} c/u • Subtotal: $${subtotal}</p>
                    </div>
                    <div class="cart-item-actions">
                        <button onclick="window.amp_changeQuantity('${id}', -1)">-</button>
                        <span>${item.quantity}</span>
                        <button onclick="window.amp_changeQuantity('${id}', 1)">+</button>
                    </div>
                `;
                cartItemsContainer.appendChild(row);
            });

            if (totalItemsCount === 0) {
                cartItemsContainer.innerHTML = '<p style="text-align:center; color:#86868b; margin-top:20px;">Tu carrito está vacío.</p>';
                btnPay.disabled = true;
            } else {
                btnPay.disabled = false;
            }

            cartTotalVal.innerText = `$${total}`;
            cartBadgeCount.innerText = totalItemsCount;
        }

        btnPay.addEventListener('click', async () => {
            if (Object.keys(cart).length === 0) return;

            btnPay.disabled = true;
            btnPay.innerText = "Procesando pedido...";

            try {
                const deliveryOption = document.querySelector('input[name="delivery"]:checked').value;
                const entregaTexto = deliveryOption === 'envio' ? "Envío a domicilio" : "Retirar gratis en dirección del vendedor";

                let mensajeWhatsApp = "Hola! Vengo de tu catálogo y quiero confirmar este pedido:\n\n";
                let totalPedido = 0;

                for (const id of Object.keys(cart)) {
                    const itemComprado = cart[id];
                    const stockProductRef = ref(db, `perfumes/${id}/stock`);

                    await runTransaction(stockProductRef, (currentStock) => {
                        if (currentStock === null) return 0;
                        return Math.max(0, currentStock - itemComprado.quantity);
                    });

                    const subtotal = itemComprado.precio * itemComprado.quantity;
                    totalPedido += subtotal;
                    mensajeWhatsApp += `- ${itemComprado.nombre} \n  Cantidad: ${itemComprado.quantity} u. x $${itemComprado.precio}\n  Subtotal: $${subtotal}\n\n`;
                }

                mensajeWhatsApp += `TOTAL A PAGAR: $${totalPedido}\n`;
                mensajeWhatsApp += `Método de entrega preferido: ${entregaTexto}\n\n`;
                mensajeWhatsApp += "Quedo atento para coordinar el método de pago y los detalles finales.";

                cart = {};
                renderCart();
                closeAllModales();

                const urlWhatsApp = `https://wa.me/${WHATSAPP_NUMERO}?text=${encodeURIComponent(mensajeWhatsApp)}`;
                window.open(urlWhatsApp, '_blank');

            } catch (error) {
                alert("Hubo un percance procesando el stock. Reintenta de nuevo por favor.");
                console.error(error);
            } finally {
                btnPay.disabled = false;
                btnPay.innerHTML = "Hacer pago por WhatsApp";
            }
        });
    </script>
</body>
</html>
