<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Amakha Paris 360</title>
    <style>
        :root {
            --primary-text: #ffffff;
            --secondary-text: #a1a1a6;
            --accent-gold: #d4af37;
            --bg-gradient: linear-gradient(135deg, #0f0f11 0%, #1c1c1e 100%);
            --card-bg: rgba(30, 30, 34, 0.75);
            --card-border: rgba(255, 255, 255, 0.12);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-gradient); background-attachment: fixed; color: var(--primary-text); min-height: 100vh; padding-bottom: 80px; overflow-x: hidden; }
        
        /* Brillos ambientales sutiles de fondo para ambiente premium */
        .bg-shape { position: fixed; border-radius: 50%; filter: blur(80px); z-index: -1; opacity: 0.6; }
        .shape1 { width: 300px; height: 300px; background: rgba(214, 175, 55, 0.08); top: -50px; left: -50px; }
        .shape2 { width: 250px; height: 250px; background: rgba(138, 43, 226, 0.05); bottom: 100px; right: -50px; }

        header { position: sticky; top: 0; z-index: 90; background: rgba(15, 15, 17, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255, 255, 255, 0.08); padding: 20px; text-align: center; }
        header h1 { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; background: linear-gradient(135deg, #fee082 0%, #d4af37 50%, #a37c1e 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        header p { font-size: 13px; color: var(--secondary-text); margin-top: 5px; letter-spacing: 0.3px; }

        .catalog-container { padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 18px; max-width: 800px; margin: 0 auto; }
        
        /* Casillas de productos con alto relieve y resalte individual */
        .product-card { background: var(--card-bg); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid var(--card-border); border-radius: 22px; padding: 14px; box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4); display: flex; flex-direction: column; transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease; }
        .product-card:hover { transform: translateY(-3px); border-color: rgba(214, 175, 55, 0.3); box-shadow: 0 16px 35px rgba(0, 0, 0, 0.6); }
        
        .product-image-container { width: 100%; aspect-ratio: 1 / 1; background: rgba(255, 255, 255, 0.04); border-radius: 14px; margin-bottom: 12px; overflow: hidden; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255, 255, 255, 0.05); }
        .product-image-container img { width: 100%; height: 100%; object-fit: cover; }

        .product-name { font-size: 15px; font-weight: 600; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #ffffff; }
        .product-price { font-size: 18px; font-weight: 700; margin-bottom: 10px; color: #ffffff; }

        .stock-badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; text-align: center; margin-bottom: 12px; }
        .stock-high { background: rgba(48, 209, 88, 0.15); color: #30d158; }
        .stock-low { background: rgba(255, 159, 10, 0.15); color: #ff9f0a; }
        .stock-out { background: rgba(255, 69, 58, 0.15); color: #ff453a; opacity: 0.6; }
        .out-of-stock-card { opacity: 0.4; filter: grayscale(0.6); }

        /* Botón de Acción Elegante */
        .btn-add-cart { background: var(--accent-gold); color: #000000; border: none; padding: 11px; border-radius: 12px; font-weight: 700; font-size: 13px; cursor: pointer; margin-top: auto; transition: background 0.2s, transform 0.1s; text-transform: uppercase; letter-spacing: 0.2px; }
        .btn-add-cart:active { transform: scale(0.96); }
        .btn-add-cart:disabled { background: #3a3a3c; color: #8e8e93; cursor: not-allowed; transform: none; }

        /* Botón Flotante del Carrito */
        .cart-floating-btn { position: fixed; bottom: 24px; right: 24px; background: #ffffff; color: #1c1c1e; padding: 16px 22px; border-radius: 30px; font-weight: 700; box-shadow: 0 12px 35px rgba(0,0,0,0.6); z-index: 100; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: transform 0.2s, background-color 0.2s; }
        .cart-floating-btn:active { transform: scale(0.93); }
        .cart-badge { background: #1c1c1e; color: #ffffff; font-size: 12px; padding: 3px 9px; border-radius: 12px; font-weight: 700; }

        /* Drawer Lateral del Carrito */
        .cart-modal { position: fixed; top: 0; right: -100%; width: 100%; max-width: 400px; height: 100vh; background: rgba(20, 20, 22, 0.9); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); box-shadow: -15px 0 40px rgba(0,0,0,0.5); z-index: 200; transition: right 0.35s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; border-left: 1px solid rgba(255, 255, 255, 0.08); color: #ffffff; }
        .cart-modal.open { right: 0; }
        
        .cart-header { padding: 24px 20px; border-bottom: 1px solid rgba(255,255,255,0.08); display: flex; justify-content: space-between; align-items: center; }
        .cart-header h2 { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
        .close-btn { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--secondary-text); transition: color 0.2s; }
        .close-btn:hover { color: #ffffff; }

        .cart-items-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.06); }
        .cart-item-info h4 { font-size: 15px; font-weight: 600; margin-bottom: 3px; color: #ffffff; }
        .cart-item-info p { font-size: 13px; color: var(--secondary-text); }
        
        .cart-item-actions { display: flex; align-items: center; gap: 12px; }
        .cart-item-actions button { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); width: 30px; height: 30px; border-radius: 50%; font-weight: 600; color: #ffffff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
        .cart-item-actions button:hover { background: rgba(255,255,255,0.15); }
        .cart-item-actions span { font-size: 14px; font-weight: 700; min-width: 16px; text-align: center; }

        .cart-footer { padding: 24px 20px; border-top: 1px solid rgba(255,255,255,0.08); background: rgba(15,15,17,0.6); }
        .cart-total-row { display: flex; justify-content: space-between; font-size: 19px; font-weight: 700; margin-bottom: 18px; }
        
        .btn-checkout { background: #25D366; color: white; border: none; width: 100%; padding: 15px; border-radius: 16px; font-size: 16px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.2); transition: background 0.2s, transform 0.1s; }
        .btn-checkout:hover { background: #20ba59; }
        .btn-checkout:active { transform: scale(0.98); }
        .btn-checkout:disabled { background: #3a3a3c; color: #8e8e93; box-shadow: none; cursor: not-allowed; }

        .cart-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.5); z-index: 150; display: none; backdrop-filter: blur(5px); }
        .cart-overlay.open { display: block; }
    </style>
</head>
<body>

    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>

    <header>
        <h1>Amakha Paris 360</h1>
        <p>Catálogo de Fragancias Disponibles</p>
    </header>

    <main class="catalog-container" id="catalog">
        <p style="text-align:center; width:100%; color: var(--secondary-text);">Cargando catálogo...</p>
    </main>

    <div class="cart-floating-btn" id="cart-btn">
        <span>Mi Pedido</span>
        <span class="cart-badge" id="cart-badge-count">0</span>
    </div>

    <div class="cart-overlay" id="cart-overlay"></div>
    <div class="cart-modal" id="cart-modal">
        <div class="cart-header">
            <h2>Tu Pedido</h2>
            <button class="close-btn" id="cart-close">✕</button>
        </div>
        <div class="cart-items-container" id="cart-items">
            </div>
        <div class="cart-footer">
            <div class="cart-total-row">
                <span>Total:</span>
                <span id="cart-total-val">$0</span>
            </div>
            <button class="btn-checkout" id="btn-pay" disabled>
                Hacer pago por WhatsApp
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue, runTransaction } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // Configuración de tu Firebase Realtime Database
        const firebaseConfig = {
            apiKey: "AIzaSyDtT22MM01MGoNosSBNHEdvKQlGu8ghIBQ",
            authDomain: "inventario-de-local.firebaseapp.com",
            databaseURL: "https://inventario-de-local-default-rtdb.firebaseio.com",
            projectId: "inventario-de-local",
            storageBucket: "inventario-de-local.firebasestorage.app",
            messagingSenderId: "535105215340",
            appId: "1:535105215340:web:47fcd308f64297b1c23149"
        };

        // Número de WhatsApp (Formato internacional sin el signo +)
        const WHATSAPP_NUMERO = "59890000000"; 

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const perfumesRef = ref(db, "perfumes");

        let dbInventory = {}; 
        let cart = {};        

        const cartBtn = document.getElementById('cart-btn');
        const cartModal = document.getElementById('cart-modal');
        const cartOverlay = document.getElementById('cart-overlay');
        const cartClose = document.getElementById('cart-close');
        const cartItemsContainer = document.getElementById('cart-items');
        const cartTotalVal = document.getElementById('cart-total-val');
        const cartBadgeCount = document.getElementById('cart-badge-count');
        const btnPay = document.getElementById('btn-pay');

        const toggleCart = () => {
            cartModal.classList.toggle('open');
            cartOverlay.classList.toggle('open');
        };
        cartBtn.addEventListener('click', toggleCart);
        cartClose.addEventListener('click', toggleCart);
        cartOverlay.addEventListener('click', toggleCart);

        onValue(perfumesRef, (snapshot) => {
            const catalogContainer = document.getElementById('catalog');
            catalogContainer.innerHTML = ''; 

            if (!snapshot.exists()) {
                catalogContainer.innerHTML = '<p style="text-align:center; width:100%; color: var(--secondary-text);">No hay perfumes disponibles actualmente.</p>';
                dbInventory = {};
                validateCartStock();
                return;
            }

            dbInventory = snapshot.val();
            
            Object.keys(dbInventory).forEach((id) => {
                const perfume = dbInventory[id];
                
                let stockClass = '';
                let stockText = '';
                let cardClass = 'product-card';
                let isBtnDisabled = false;

                if (perfume.stock > 4) {
                    stockClass = 'stock-high';
                    stockText = `Stock: ${perfume.stock} disp.`;
                } else if (perfume.stock > 0 && perfume.stock <= 4) {
                    stockClass = 'stock-low';
                    stockText = `Solo ${perfume.stock} disponibles`;
                } else {
                    stockClass = 'stock-out';
                    stockText = 'Agotado';
                    cardClass += ' out-of-stock-card';
                    isBtnDisabled = true;
                }

                const imagenSrc = perfume.fotoUrl ? perfume.fotoUrl : 'https://via.placeholder.com/300?text=Sin+Foto';

                const card = document.createElement('div');
                card.className = cardClass;
                card.innerHTML = `
                    <div class="product-image-container">
                        <img src="${imagenSrc}" alt="${perfume.nombre}" loading="lazy" onerror="this.onerror=null; this.src='https://via.placeholder.com/300?text=Error+Enlace';">
                    </div>
                    <h2 class="product-name">${perfume.nombre}</h2>
                    <div class="product-price">$${perfume.precio}</div>
                    <div class="stock-badge ${stockClass}">${stockText}</div>
                    <button class="btn-add-cart" ${isBtnDisabled ? 'disabled' : ''} data-id="${id}">
                        ${isBtnDisabled ? 'Agotado' : 'Agregar'}
                    </button>
                `;
                catalogContainer.appendChild(card);
            });

            document.querySelectorAll('.btn-add-cart').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = e.target.getAttribute('data-id');
                    addToCart(id);
                });
            });

            validateCartStock();
        });

        function addToCart(id) {
            const maxAvailable = dbInventory[id]?.stock || 0;
            const currentInCart = cart[id]?.quantity || 0;

            if (currentInCart < maxAvailable) {
                if (!cart[id]) {
                    cart[id] = {
                        nombre: dbInventory[id].nombre,
                        precio: dbInventory[id].precio,
                        quantity: 1
                    };
                } else {
                    cart[id].quantity += 1;
                }
                renderCart();
            } else {
                alert("Lo sentimos, no hay más stock disponible de este perfume.");
            }
        }

        amp_changeQuantity = function changeQuantity(id, change) {
            if (!cart[id]) return;
            
            const maxAvailable = dbInventory[id]?.stock || 0;
            const newQuantity = cart[id].quantity + change;

            if (newQuantity <= 0) {
                delete cart[id];
            } else if (newQuantity <= maxAvailable) {
                cart[id].quantity = newQuantity;
            } else {
                alert("Has alcanzado el límite máximo de unidades en stock.");
            }
            renderCart();
        }

        function validateCartStock() {
            let changesMade = false;
            Object.keys(cart).forEach(id => {
                const currentStock = dbInventory[id]?.stock || 0;
                if (currentStock === 0) {
                    delete cart[id];
                    changesMade = true;
                } else if (cart[id].quantity > currentStock) {
                    cart[id].quantity = currentStock;
                    changesMade = true;
                }
            });
            if (changesMade) renderCart();
        }

        function renderCart() {
            cartItemsContainer.innerHTML = '';
            let total = 0;
            let totalItemsCount = 0;

            Object.keys(cart).forEach(id => {
                const item = cart[id];
                const subtotal = item.precio * item.quantity;
                total += subtotal;
                totalItemsCount += item.quantity;

                const row = document.createElement('div');
                row.className = 'cart-item';
                row.innerHTML = `
                    <div class="cart-item-info">
                        <h4>${item.nombre}</h4>
                        <p>$${item.precio} c/u • Subtotal: $${subtotal}</p>
                    </div>
                    <div class="cart-item-actions">
                        <button class="minus-btn" data-id="${id}">-</button>
                        <span>${item.quantity}</span>
                        <button class="plus-btn" data-id="${id}">+</button>
                    </div>
                `;
                cartItemsContainer.appendChild(row);
            });

            if (totalItemsCount === 0) {
                cartItemsContainer.innerHTML = '<p style="text-align:center; color:#86868b; margin-top:20px;">Tu carrito está vacío.</p>';
                btnPay.disabled = true;
            } else {
                btnPay.disabled = false;
            }

            cartTotalVal.innerText = `$${total}`;
            cartBadgeCount.innerText = totalItemsCount;

            document.querySelectorAll('.minus-btn').forEach(b => b.addEventListener('click', (e) => amp_changeQuantity(e.target.getAttribute('data-id'), -1)));
            document.querySelectorAll('.plus-btn').forEach(b => b.addEventListener('click', (e) => amp_changeQuantity(e.target.getAttribute('data-id'), 1)));
        }

        let amp_changeQuantity;

        btnPay.addEventListener('click', async () => {
            if (Object.keys(cart).length === 0) return;

            btnPay.disabled = true;
            btnPay.innerText = "Procesando pedido...";

            try {
                let mensajeWhatsApp = "*Hola! Vengo de tu catálogo y quiero confirmar este pedido:*\n\n";
                let totalPedido = 0;

                for (const id of Object.keys(cart)) {
                    const itemComprado = cart[id];
                    const stockProductRef = ref(db, `perfumes/${id}/stock`);

                    await runTransaction(stockProductRef, (currentStock) => {
                        if (currentStock === null) return 0;
                        return Math.max(0, currentStock - itemComprado.quantity);
                    });

                    const subtotal = itemComprado.precio * itemComprado.quantity;
                    totalPedido += subtotal;
                    mensajeWhatsApp += `- *${itemComprado.nombre}* \n  Cantidad: ${itemComprado.quantity} u. x $${itemComprado.precio}\n  Subtotal: $${subtotal}\n\n`;
                }

                mensajeWhatsApp += `*TOTAL A PAGAR: $${totalPedido}*\n\n`;
                mensajeWhatsApp += "Quedo atento para coordinar el método de pago y los detalles del envío.";

                cart = {};
                renderCart();
                toggleCart();

                const urlWhatsApp = `https://wa.me/${WHATSAPP_NUMERO}?text=${encodeURIComponent(mensajeWhatsApp)}`;
                window.open(urlWhatsApp, '_blank');

            } catch (error) {
                alert("Hubo un percance procesando el stock. Reintenta de nuevo por favor.");
                console.error(error);
            } finally {
                btnPay.disabled = false;
                btnPay.innerHTML = "Hacer pago por WhatsApp";
            }
        });
    </script>
</body>
</html>
